name: Dependabot auto-merge

# Auto-merge Dependabot PATCH/MINOR bumps AFTER the required checks pass, for the
# maintainer's bot ONLY. A ruleset on `main` (require all-green + analyze, bypass
# the owner) makes `--auto` WAIT for CI+CodeQL — without it `--auto` would merge
# immediately, so the ruleset is load-bearing, not optional. A red check leaves the
# PR open (the dependabot.yml `assignees` then notifies the maintainer). MAJOR bumps
# are never auto-merged (a human reviews the breaking change). Only `dependabot[bot]`
# reaches the merge step, so a human-opened PR never auto-merges.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      # Patch + minor auto-merge; a major bump waits for a human.
      - name: Enable auto-merge (patch/minor)
        if: ${{ steps.meta.outputs.update-type != 'version-update:semver-major' }}
        run: gh pr merge --squash --auto "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
